<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow Web - Produtividade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 bg-light">

    <div class="container text-center" data-aos="fade-up">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg p-4 border-0">
                    <div class="card-body">
                        <h1 class="card-title mb-4 fw-bold text-primary"><i class="fa-solid fa-brain-circuit me-2"></i>FocusFlow</h1>
                        
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="taskInput" placeholder="Estudar">
                            <label for="taskInput">O que vamos estudar agora?</label>
                        </div>

                        <div class="timer-display my-4 p-4 rounded-4 bg-dark text-white" id="timerBox">
                            <h2 class="display-1 fw-bold mb-0" id="timerDisplay">25:00</h2>
                            <p class="small text-uppercase mt-2 mb-0 text-muted" id="statusLabel">Aguardando Início</p>
                        </div>

                        <div class="d-flex gap-2 justify-content-center">
                            <button class="btn btn-success btn-lg px-4 rounded-pill" id="btnStart"><i class="fa-solid fa-play me-2"></i>Iniciar</button>
                            <button class="btn btn-danger btn-lg px-4 rounded-pill d-none" id="btnStop"><i class="fa-solid fa-stop me-2"></i>Parar</button>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mt-4 p-3 border-0 bg-white" data-aos="fade-up" data-aos-delay="200">
                    <div class="card-body">
                        <p class="fst-italic text-muted mb-2" id="quoteText">"Clique em Iniciar para carregar uma dose de motivação..."</p>
                        <span class="small fw-bold text-secondary" id="quoteAuthor">FocusFlow Bot</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="finishModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <div class="modal-body">
                    <i class="fa-solid fa-trophy text-warning display-3 mb-3"></i>
                    <h3>Excelente Trabalho!</h3>
                    <p id="modalMessage">Ciclo finalizado.</p>
                    <button class="btn btn-primary rounded-pill" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
