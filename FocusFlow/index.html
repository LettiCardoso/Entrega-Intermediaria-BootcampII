<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow - Organizador de Estudos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="container text-center" data-aos="fade-up" data-aos-duration="1000">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="card shadow-lg p-4 border-0">
                    <div class="card-body">
                        
                        <h1 class="card-title mb-4 fw-bold text-gradient">
                            <i class="fa-solid fa-brain-circuit text-primary me-2"></i>FocusFlow
                        </h1>
                        <p class="text-muted small mb-4">v1.1.0 - Edição Web</p>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control border-2" id="taskInput" placeholder="O que vamos estudar?">
                            <label for="taskInput"><i class="fa-solid fa-list-check me-2 text-secondary"></i>O que vamos estudar agora?</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="number" class="form-control border-2" id="timeInput" placeholder="Minutos" value="25" min="1">
                            <label for="timeInput"><i class="fa-solid fa-hourglass-half me-2 text-secondary"></i>Duração (minutos)</label>
                        </div>

                        <div class="timer-display my-4 p-3 rounded-4 bg-light" id="timerBox">
                            <h2 class="display-1 fw-bold text-dark mb-0" id="timerDisplay">25:00</h2>
                            <p class="text-uppercase tracking-wider small fw-bold text-secondary mt-2 mb-0" id="statusLabel">Aguardando Início</p>
                        </div>

                        <div class="d-flex gap-2 justify-content-center">
                            <button class="btn btn-success btn-lg px-4 rounded-pill fw-bold" id="btnStart">
                                <i class="fa-solid fa-play me-2"></i>Iniciar
                            </button>
                            <button class="btn btn-warning btn-lg px-4 rounded-pill fw-bold text-white d-none" id="btnPause">
                                <i class="fa-solid fa-pause me-2"></i>Pausar
                            </button>
                            <button class="btn btn-danger btn-lg px-4 rounded-pill fw-bold d-none" id="btnStop">
                                <i class="fa-solid fa-stop me-2"></i>Parar
                            </button>
                        </div>

                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <div class="modal fade" id="finishModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body p-5 text-center">
                    <i class="fa-solid fa-circle-check text-success display-3 mb-3"></i>
                    <h3 class="fw-bold mb-3">Parabéns!</h3>
                    <p class="text-muted" id="modalMessage">Ciclo de estudos finalizado! Hora de uma pausa.</p>
                    <button type="button" class="btn btn-primary px-4 rounded-pill" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
